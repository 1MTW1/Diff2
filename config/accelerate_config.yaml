# Accelerate Multi-GPU 학습 설정.
# 사용 가능한 GPU 수에 맞게 num_processes만 조정.
#
# 또는 대화형 생성: `accelerate config`
# 단일 GPU 디버깅:   `python -m training.train ...`
compute_environment: LOCAL_MACHINE
distributed_type: MULTI_GPU
downcast_bf16: 'no'
gpu_ids: "0, 1, 2, 3"
machine_rank: 0
main_training_function: main
mixed_precision: 'no'      # 필요시 'fp16' / 'bf16'
num_machines: 1
num_processes: 4           # ← 보유 GPU 수에 맞게 변경
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
