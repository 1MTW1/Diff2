# Diffusion²-LDM — LDM/SD 프로토콜 (재매개변수화 z) 실험 config.
#
# `config/default.yaml`와 동일하되 latent_norm.stats_path만 분리해
# stats과 학습 체크포인트가 기존 실험(μ-only)과 섞이지 않게 한다.
#
# 변경점 (vs default.yaml):
#   latent_norm.stats_path : outputs/vae/latent_stats.pt
#                          → outputs/vae/latent_stats_reparam.pt
#
# 코드 측 차이 (default.yaml과 default_reparam.yaml 둘 다 영향):
#   - scripts/compute_latent_stats.py 가 재매개변수화 z 기반으로 통계 산출.
#   - training/train.py:_encode_to_latent 가 DiT에 sampled z 주입.
#   기존 outputs/ldm_experiment_1 체크포인트는 μ-only 시절 코드로 학습됐고
#   그 체크포인트의 embedded config로 동작하므로 영향 없음.

# ── Data ──────────────────────────────────────────────────────────
data:
  normalized_path: 'data/era5_normalized.zarr'
  stats_path: 'data/normalization_stats.zarr'   # 픽셀 역정규화용 (latent와 무관)
  variables: ['t', 'u', 'v']     # temperature, u-wind, v-wind
  n_channels: 3                  # C
  spatial: [64, 64]              # H x W (한반도 patch)
  target_frames: 2               # DDPM 1회가 예측하는 프레임 수
  time_step_hours: 6

  splits:
    train:      ['2000-01-01', '2019-12-31']
    validation: ['2020-01-01', '2021-12-31']
    test:       ['2022-01-01', '2022-12-31']

# ── VAE — Stage 0에서 별도 선학습 후 freeze (§2.1) ─────────────────
vae:
  in_channels: 6           # = target_frames × n_channels
  latent_channels: 12      # C_z = 2 × in_channels (총 8배 압축)
  latent_spatial: [16, 16] # H_z × W_z (64 → 16, ×4 downsample)
  base_channels: 128       # encoder/decoder base width
  ch_mult: [1, 2]          # level별 채널 배수 (len = downsample 횟수)
  kl_weight: 1.0e-6        # 약한 KL — LDM/SD 관례. 키우면 posterior collapse 위험
  grad_weight: 0.0         # spatial gradient 재구성 보조항 (0 = off)
  logvar_clip: [-30.0, 20.0]
  checkpoint: 'outputs/vae/vae_best.pt'   # 기존 VAE 그대로 사용
  training:                # Stage 0 학습 하이퍼파라미터
    epochs: 500            # 충분한 수렴을 위해 길게
    lr: 1.0e-4
    weight_decay: 0.0
    batch_size: 64
    num_workers: 4
    grad_clip: 1.0
    checkpoint_every: 10
    validation_every: 5

# ── Latent 정규화 — VAE 학습 후 사후 통계 (§2.2) ───────────────────
latent_norm:
  mode: channel_pixelwise        # {channel_pixelwise, channelwise}
  stats_path: 'outputs/vae/latent_stats_reparam.pt'   # ★ μ-only 버전과 분리

# ── Condition Encoder (§2.3) ──────────────────────────────────────
encoder:
  hidden_channels: 64      # C' (Conv3d 출력 채널)
  num_layers: 2
  patch_size: 4            # 64 → 16 토큰 격자 (256 토큰)
  token_dim: 384           # D — dit.token_dim과 반드시 일치

# ── DiT backbone + dual-head (§2.4) ───────────────────────────────
dit:
  token_dim: 384           # D
  depth: 4
  num_heads: 6
  patch_size: 1            # latent 16×16 → 256 토큰 (각 latent 픽셀 = 1 토큰)
  mlp_ratio: 4.0
  dropout: 0.1

# ── Noise schedule — VDM 연속시간 (§2.5) ──────────────────────────
schedule:
  type: linear_logsnr
  gamma_min: -6.0          # 튜닝 대상 (per-σ loss 보고 조정)
  gamma_max: 6.0

# ── Dual-head ─────────────────────────────────────────────────────
dual_head:
  log_var_clip: [-10.0, 10.0]

# ── Sampling (§4) ─────────────────────────────────────────────────
sampling:
  num_steps: 50                  # 추론 denoising step N
  past_sampling_steps_train: 50  # 학습 시 past 샘플링 step (추론과 일치 — OOD 방지)
  past_sample_cache: false       # past 생성물 캐싱 (학습 비용 완화 옵션)

# ── Training — Stage 1~3 diffusion 학습 ───────────────────────────
# batch_size는 *per-process* (DDP 각 GPU당) 크기.
training:
  batch_size: 32       # per-process (DDP 각 GPU당). 4-GPU → 글로벌 128
  lr: 1.0e-4
  weight_decay: 1.0e-5
  total_epochs: 200
  num_workers: 4
  grad_clip: 1.0
  loss: heteroscedastic_nll
  min_snr_weighting: false  # SNR 기반 loss 가중 (예약 — 현재 미구현, off 고정)

  curriculum:           # Stage 1: past / Stage 2: main / Stage 3: joint
    stage1_epochs: 50   # Encoder + DiT_past
    stage2_epochs: 100  # DiT_main (+ Encoder), DiT_past frozen
    stage3_epochs: 50   # 전체 joint

  checkpoint_every: 10
  validation_every: 5

# ── Inference ─────────────────────────────────────────────────────
inference:
  ensemble_size: 20

# ── Logging ───────────────────────────────────────────────────────
logging:
  output_dir: 'outputs/'
  save_visualizations: true
  log_every: 100
